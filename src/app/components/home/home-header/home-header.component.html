<div
  id="Title"
  class="w-full relative flex flex-col justify-center items-center min-h-screen"
>
  <img
    [src]="image()"
    alt="Fondo"
    class="absolute inset-0 w-full h-full object-cover animate-scale-in"
  />
  <div
    class="absolute inset-0 bg-gradient-to-br from-primary-900/80 via-primary-800/70 to-secondary-900/80"
  ></div>
  <div
    class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"
  ></div>

  <div class="z-10 text-center px-4 sm:px-6 lg:px-8 animate-fadeInUp">
    <div class="mb-8">
      <h1
        class="text-5xl sm:text-6xl md:text-7xl lg:text-8xl xl:text-9xl font-black text-white mb-4 animate-slide-in-left"
      >
        <span
          class="bg-gradient-to-r from-white via-primary-100 to-secondary-200 bg-clip-text text-transparent"
        >
          Market
        </span>
      </h1>
      <div
        class="text-xl sm:text-2xl md:text-3xl lg:text-4xl xl:text-5xl font-bold text-accent-400 animate-slide-in-right"
      >
        <span class="text-white">Web</span>
        <span class="text-secondary-400 font-black">X</span>
      </div>
    </div>

    <p
      class="text-lg sm:text-xl md:text-2xl text-white/90 mb-8 max-w-2xl mx-auto leading-relaxed animate-fadeInUp animation-delay-300"
    >
      Descubre productos únicos de las mejores tiendas locales.
      <span class="block text-accent-300 font-semibold"
        >Calidad, variedad y conveniencia en un solo lugar.</span
      >
    </p>

    <div
      class="flex flex-col sm:flex-row gap-4 justify-center items-center mb-12 animate-scale-in animation-delay-500"
    >
      <button
        routerLink="/store"
        class="bg-gradient-to-r from-primary-500 to-primary-600 hover:from-primary-600 hover:to-primary-700 text-white font-bold py-4 px-8 rounded-full shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-300 flex items-center space-x-2"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
          />
        </svg>
        <span>Explorar Tiendas</span>
      </button>

      <button
        routerLink="/products"
        class="bg-white/10 hover:bg-white/20 text-white font-bold py-4 px-8 rounded-full border-2 border-white/30 hover:border-white/50 transition-all duration-300 flex items-center space-x-2 backdrop-blur-sm"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"
          />
        </svg>
        <span>Ver Productos</span>
      </button>
    </div>

    @if (user) {
    <div class="animate-fadeInUp animation-delay-700">
      <app-avatar [user]="user" />
    </div>
    } @else {
    <div
      class="bg-white/10 backdrop-blur-md rounded-2xl p-6 border border-white/20 animate-fadeInUp animation-delay-700"
    >
      <p class="text-white text-lg mb-4">
        Únete a nuestra comunidad de compradores
      </p>
      <a
        routerLink="/user/register"
        class="inline-flex items-center px-6 py-3 bg-gradient-to-r from-accent-500 to-accent-600 hover:from-accent-600 hover:to-accent-700 text-white font-semibold rounded-full transition-all duration-300 hover:scale-105 shadow-lg hover:shadow-xl"
      >
        <svg
          class="w-5 h-5 mr-2"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"
          />
        </svg>
        Registrarse Ahora
      </a>
    </div>
    }
  </div>

  <!-- Scroll indicator -->
  <div
    class="absolute bottom-8 left-1/2 transform -translate-x-1/2 animate-bounce"
  >
    <svg
      class="w-6 h-6 text-white/70"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M19 14l-7 7m0 0l-7-7m7 7V3"
      />
    </svg>
  </div>
</div>
